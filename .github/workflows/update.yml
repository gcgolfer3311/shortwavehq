name: Daily SW Update
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} python3 update.py
          git config user.email "bot@shortwavehq.com"
          git config user.name "SHQ Bot"
          git add data/live.json
          git diff --staged --quiet || git commit -m "Daily SW update"
          git push
