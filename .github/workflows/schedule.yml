name: Update Shortwave Schedule

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run schedule updater
        run: |
          echo "Starting schedule_update.py"
          python schedule_update.py
          echo "Finished"

      - name: Commit updated schedule
        run: |
          git config user.name "shortwavehq-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/schedule.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update schedule from EIBI ($(date -u +%Y-%m-%d))"
            git push
          fi
