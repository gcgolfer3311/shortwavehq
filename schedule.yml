name: Update Shortwave Schedule

# Runs daily to pull the latest EIBI A-26 schedule and refresh data/schedule.json.
# The site loads that file at startup, so the whole station database self-updates
# with no manual editing. Safe by design: schedule_update.py refuses to overwrite
# with a bad/short parse, and now also catches any unexpected error internally,
# so a failed fetch or a bug never fails this Action or breaks the live site.

on:
  schedule:
    - cron: '17 5 * * *'   # 05:17 UTC daily (offset so it's not on the hour)
  workflow_dispatch:         # lets you run it manually from the Actions tab

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run schedule updater
        run: |
          echo "── Starting schedule_update.py ──"
          python schedule_update.py
          echo "── schedule_update.py finished with exit code $? ──"
          echo "── Current data/schedule.json status ──"
          if [ -f data/schedule.json ]; then
            ls -la data/schedule.json
            python -c "import json;d=json.load(open('data/schedule.json'));print('updated_utc:',d.get('updated_utc'));print('count:',d.get('count'))"
          else
            echo "data/schedule.json does not exist!"
          fi

      - name: Commit updated schedule
        run: |
          git config user.name  "shortwavehq-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/schedule.json
          if git diff --staged --quiet; then
            echo "No schedule changes today — nothing to commit."
          else
            git commit -m "Auto-update shortwave schedule from EIBI ($(date -u +%Y-%m-%d))"
            echo "── Pushing commit ──"
            git push
            echo "── Push complete ──"
          fi
